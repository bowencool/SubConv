<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SubConv</title>
  </head>
  <body class="min-h-screen bg-zinc-50 dark:bg-zinc-950 text-zinc-950 dark:text-zinc-50 flex flex-col items-center py-12 px-4 font-sans selection:bg-zinc-900 selection:text-white dark:selection:bg-zinc-100 dark:selection:text-zinc-900 antialiased">

    <!-- Card -->
    <div class="w-full max-w-2xl bg-white dark:bg-zinc-950 border border-zinc-200 dark:border-zinc-800 rounded-xl shadow-sm p-6 md:p-8">

      <!-- Header -->
      <div class="mb-8 flex justify-between items-center pb-6 border-b border-zinc-200 dark:border-zinc-800">
        <div>
          <h1 class="text-2xl font-semibold tracking-tight text-zinc-950 dark:text-zinc-50">SubConv</h1>
          <p class="text-sm text-zinc-500 dark:text-zinc-400 mt-1">快速转换您的订阅链接</p>
        </div>
        <a href="https://github.com/bowencool/SubConv" target="_blank"
           class="text-zinc-500 hover:text-zinc-900 dark:text-zinc-400 dark:hover:text-zinc-50 transition-colors"
           aria-label="GitHub Repository">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" viewBox="0 0 16 16">
            <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.012 8.012 0 0 0 16 8c0-4.42-3.58-8-8-8z"/>
          </svg>
        </a>
      </div>

      <!-- Form -->
      <div class="space-y-6">

        <!-- 订阅 -->
        <div class="space-y-2">
          <label for="linkInput" class="text-sm font-medium leading-none peer-disabled:cursor-not-allowed peer-disabled:opacity-70">
            订阅链接
          </label>
          <textarea id="linkInput" rows="4"
            class="flex w-full rounded-md border border-zinc-200 bg-transparent px-3 py-2 text-sm shadow-sm placeholder:text-zinc-500 focus-visible:outline-none focus-visible:ring-1 focus-visible:ring-zinc-950 disabled:cursor-not-allowed disabled:opacity-50 dark:border-zinc-800 dark:placeholder:text-zinc-400 dark:focus-visible:ring-zinc-300 resize-none transition-colors"
            placeholder="请粘贴订阅链接，多个链接请换行或用 | 隔开"></textarea>
        </div>

        <div class="grid gap-6 md:grid-cols-2">
          <!-- 代理规则集 -->
          <div class="flex items-center justify-between space-x-2 rounded-lg border border-zinc-200 dark:border-zinc-800 p-4 shadow-sm">
            <div class="space-y-0.5">
              <label for="proxySwitch" class="text-sm font-medium">代理规则集</label>
              <p class="text-xs text-zinc-500 dark:text-zinc-400">关闭则直连 GitHub</p>
            </div>
            <label class="relative inline-flex items-center cursor-pointer select-none">
              <input id="proxySwitch" type="checkbox" class="sr-only peer" checked />
              <div class="w-9 h-5 bg-zinc-200 hover:bg-zinc-300 peer-focus:outline-none rounded-full peer dark:bg-zinc-800 dark:hover:bg-zinc-700 peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-zinc-300 after:border after:rounded-full after:h-4 after:w-4 after:transition-all dark:border-zinc-600 peer-checked:bg-zinc-900 dark:peer-checked:bg-zinc-50"></div>
            </label>
          </div>

          <!-- 备用节点开关 -->
          <div class="flex items-center justify-between space-x-2 rounded-lg border border-zinc-200 dark:border-zinc-800 p-4 shadow-sm">
            <div class="space-y-0.5">
              <label for="standbySwitch" class="text-sm font-medium">备用节点</label>
              <p class="text-xs text-zinc-500 dark:text-zinc-400">只出现在手动选择分组</p>
            </div>
            <label class="relative inline-flex items-center cursor-pointer select-none">
              <input id="standbySwitch" type="checkbox" class="sr-only peer" />
              <div class="w-9 h-5 bg-zinc-200 hover:bg-zinc-300 peer-focus:outline-none rounded-full peer dark:bg-zinc-800 dark:hover:bg-zinc-700 peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-zinc-300 after:border after:rounded-full after:h-4 after:w-4 after:transition-all dark:border-zinc-600 peer-checked:bg-zinc-900 dark:peer-checked:bg-zinc-50"></div>
            </label>
          </div>
        </div>

        <!-- 备用节点输入（默认隐藏） -->
        <div id="standbyInputContainer" class="hidden space-y-2 mt-4">
          <textarea id="standbyInput" rows="3"
            class="flex w-full rounded-md border border-zinc-200 bg-transparent px-3 py-2 text-sm shadow-sm placeholder:text-zinc-500 focus-visible:outline-none focus-visible:ring-1 focus-visible:ring-zinc-950 disabled:cursor-not-allowed disabled:opacity-50 dark:border-zinc-800 dark:placeholder:text-zinc-400 dark:focus-visible:ring-zinc-300 resize-none transition-colors"
            placeholder="请粘贴备用节点，多个备用节点请换行或用 | 符号隔开"></textarea>
        </div>

        <!-- 更新间隔 -->
        <div class="space-y-2">
          <label for="timeInput" class="text-sm font-medium leading-none peer-disabled:cursor-not-allowed peer-disabled:opacity-70">
            更新间隔 <span class="text-xs text-zinc-500 dark:text-zinc-400 font-normal">(单位:秒)</span>
          </label>
          <input id="timeInput" type="text" placeholder="1800"
            class="flex h-9 w-full rounded-md border border-zinc-200 bg-transparent px-3 py-1 text-sm shadow-sm transition-colors file:border-0 file:bg-transparent file:text-sm file:font-medium placeholder:text-zinc-500 focus-visible:outline-none focus-visible:ring-1 focus-visible:ring-zinc-950 disabled:cursor-not-allowed disabled:opacity-50 dark:border-zinc-800 dark:placeholder:text-zinc-400 dark:focus-visible:ring-zinc-300" />
        </div>

        <div class="my-6 border-t border-zinc-200 dark:border-zinc-800"></div>

        <!-- 结果 -->
        <div class="space-y-2 relative">
          <label for="linkOutput" class="text-sm font-medium leading-none peer-disabled:cursor-not-allowed peer-disabled:opacity-70">
            转换结果
          </label>
          <div class="relative flex w-full">
            <textarea id="linkOutput" rows="3" readonly
              class="flex w-full rounded-md border border-zinc-200 bg-zinc-50/50 dark:bg-zinc-900/50 px-3 py-2 pr-20 text-sm shadow-sm placeholder:text-zinc-500 focus-visible:outline-none focus-visible:ring-1 focus-visible:ring-zinc-950 disabled:cursor-not-allowed disabled:opacity-50 dark:border-zinc-800 dark:placeholder:text-zinc-400 dark:focus-visible:ring-zinc-300 resize-none transition-colors break-all"></textarea>
            <div class="absolute right-2 top-2">
               <button id="btnCopy"
                class="inline-flex items-center justify-center whitespace-nowrap rounded-md text-xs font-medium transition-colors focus-visible:outline-none focus-visible:ring-1 focus-visible:ring-zinc-950 disabled:pointer-events-none disabled:opacity-50 bg-zinc-100 text-zinc-900 hover:bg-zinc-200 dark:bg-zinc-800 dark:text-zinc-50 dark:hover:bg-zinc-700 h-7 px-3"
                title="复制到剪贴板">
                复制
              </button>
            </div>
            <!-- Toast -->
            <span id="toast"
              class="hidden absolute right-3 -top-6 text-xs text-green-600 dark:text-green-500 font-medium transition-opacity duration-300 bg-green-50 dark:bg-green-950/50 px-2 py-1 rounded">
              已复制
            </span>
          </div>
        </div>

        <!-- Generate Button -->
        <button id="btnGenerate"
          class="inline-flex w-full items-center justify-center whitespace-nowrap rounded-md text-sm font-medium transition-colors focus-visible:outline-none focus-visible:ring-1 focus-visible:ring-zinc-950 disabled:pointer-events-none disabled:opacity-50 bg-zinc-900 text-zinc-50 shadow hover:bg-zinc-900/90 dark:bg-zinc-50 dark:text-zinc-900 dark:hover:bg-zinc-50/90 h-10 px-4 py-2 mt-4">
          生成订阅配置
        </button>

      </div><!-- /Form -->
    </div><!-- /Card -->

    <script type="module" src="/src/client/main.ts"></script>
  </body>
</html>
