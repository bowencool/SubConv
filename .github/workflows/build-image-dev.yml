name: Build and push dev Docker image

on:
  push:
    branches:
      - main
      - dev
    paths:
      - '.github/workflows/build-image.yml'
      - '.github/workflows/build-image-dev.yml'
      - 'Dockerfile'
      - 'app/**'
      - 'lib/**'
      - 'public/**'
      - 'config.yaml'
      - 'next.config.js'
      - 'vite.config.ts'
      - 'tsconfig.json'
      - 'config.yaml.d.ts'
      - 'package.json'
      - 'package-lock.json'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    uses: ./.github/workflows/build-image.yml
    secrets: inherit
    with:
      tags: dev
